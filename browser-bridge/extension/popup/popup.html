<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Bridge</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        width: 320px;
        background: #0f1115;
        color: #e8eaed;
        padding: 16px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        font-size: 13px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #666;
      }
      .dot.connected {
        background: #34a853;
      }
      .dot.connecting {
        background: #fbbc04;
      }
      label {
        display: block;
        font-size: 12px;
        color: #9aa0a6;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #3c4043;
        background: #202124;
        color: #e8eaed;
      }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #8ab4f8;
        color: #0f1115;
        font-weight: 600;
        cursor: pointer;
      }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: #9aa0a6;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>AWFixer Browser Bridge</h1>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">Checking…</span>
    </div>
    <label for="port">Bridge port</label>
    <input id="port" type="number" value="18793" />
    <label for="token">Auth token</label>
    <div style="display: flex; gap: 8px; margin-bottom: 12px">
      <input
        id="token"
        type="password"
        placeholder="Paste token from setup-token.sh"
        style="margin-bottom: 0"
      />
      <button
        id="reveal"
        type="button"
        style="width: auto; padding: 8px 12px; background: #3c4043; color: #e8eaed"
      >
        Show
      </button>
    </div>
    <button id="save">Save & reconnect</button>
    <p class="hint">
      Token: run <code>bash browser-bridge/scripts/setup-token.sh</code> and paste above. Start the
      gateway with <code>start-gateway.sh</code>. Chrome shows a debugger banner when the agent
      attaches.
    </p>
    <script src="popup.js" type="module"></script>
  </body>
</html>
