name: Checkout
description: Clone this repository at the workflow commit SHA.

inputs:
  fetch-depth:
    description: Git fetch depth. Use 0 for a full history.
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Clone repository
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        git init .
        git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        depth="${{ inputs.fetch-depth }}"
        if [ "$depth" = "0" ]; then
          git fetch origin "${GITHUB_SHA}"
        else
          git fetch --depth "$depth" origin "${GITHUB_SHA}"
        fi

        git checkout FETCH_HEAD
