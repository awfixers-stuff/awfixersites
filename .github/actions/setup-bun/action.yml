name: Setup Bun
description: Install Bun and expose it on PATH for later workflow steps.

inputs:
  bun-version:
    description: Bun release version from package.json engines.
    required: false
    default: "1.3.14"

runs:
  using: composite
  steps:
    - name: Install Bun
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL https://bun.sh/install | bash -s -- "bun-v${{ inputs.bun-version }}"
        echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
